services:
  # Backend FastAPI Service (SQLite version)
  - type: web
    name: signal-stack-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    rootDir: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # Note: Database persists in ./data/ directory. 
      # On Render free tier, this wipes on restart.
      # Create a Disk and mount it if persistence is required.

  # Frontend Static Site
  - type: static
    name: signal-stack-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: signal-stack-backend
          property: host
