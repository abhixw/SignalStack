services:
  # Backend FastAPI Service
  - type: web
    name: signal-stack-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: signal-stack-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  # Frontend Static Site
  - type: static
    name: signal-stack-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: signal-stack-backend
          property: host

databases:
  - name: signal-stack-db
    plan: free
